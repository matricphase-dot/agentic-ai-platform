<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Agentic AI - Login</title> 
    <style> 
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%%, #764ba2 100%%); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; } 
        .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); width: 350px; } 
        .login-header { text-align: center; margin-bottom: 30px; } 
        .login-header h1 { color: #4a6fa5; margin: 0 0 10px 0; } 
        .form-group { margin-bottom: 20px; } 
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: bold; } 
        .form-group input { width: 100%%; padding: 12px; border: 2px solid #ddd; border-radius: 5px; font-size: 16px; } 
        .login-btn { width: 100%%; padding: 12px; background: #4a6fa5; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; font-weight: bold; } 
        .login-btn:hover { background: #3a5a80; } 
        .demo-credentials { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; font-size: 14px; } 
    </style> 
</head> 
<body> 
    <div class="login-container"> 
        <div class="login-header"> 
            <h1>Agentic AI Platform</h1> 
            <p>Universal AI Agent Orchestration</p> 
        </div> 
        <form id="loginForm"> 
            <div class="form-group"> 
                <label>Email</label> 
                <input type="email" id="email" value="admin@agenticai.com" required> 
            </div> 
            <div class="form-group"> 
                <label>Password</label> 
                <input type="password" id="password" value="Admin123!" required> 
            </div> 
            <button type="submit" class="login-btn">Login</button> 
        </form> 
        <div id="loginMessage" style="margin-top: 15px;"></div> 
        <div class="demo-credentials"> 
            <p><strong>Demo Credentials:</strong></p> 
            <p>Email: admin@agenticai.com</p> 
            <p>Password: Admin123!</p> 
        </div> 
    </div> 
    <script> 
    document.getElementById('loginForm').addEventListener('submit', async function(e) { 
        e.preventDefault(); 
        const email = document.getElementById('email').value; 
        const password = document.getElementById('password').value; 
        const formData = new URLSearchParams(); 
        formData.append('email', email); 
        formData.append('password', password); 
        try { 
            const response = await fetch('/api/login', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/x-www-form-urlencoded'}, 
                body: formData 
            }); 
            const result = await response.json(); 
            if (result.success) { 
                document.getElementById('loginMessage').innerHTML = '<div style="color: green; padding: 10px; background: #d4edda; border-radius: 5px;">? Login successful! Redirecting...</div>'; 
                setTimeout(() = window.location.href = '/dashboard'; }, 1000); 
            } else { 
            } 
        } catch (error) { 
            document.getElementById('loginMessage').innerHTML = '<div style="color: red; padding: 10px; background: #f8d7da; border-radius: 5px;">? Network error: ' + error.message + '</div>'; 
        } 
    }); 
    setTimeout(() =
        document.getElementById('email').value = 'admin@agenticai.com'; 
        document.getElementById('password').value = 'Admin123!'; 
    }, 100); 
    </script> 
</body> 
</html>
