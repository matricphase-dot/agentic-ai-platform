services:
  - type: web
    name: agentic-ai-backend
    env: python
    buildCommand: |
      pip install -r backend/requirements.txt
    startCommand: |
      cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false  # You'll set this manually
    autoDeploy: true
    regions:
      - oregon  # or your preferred region